{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href = "{% static 'gallery/style.css' %}" rel = "stylesheet">
    <title>Thank You</title>
</head>
<body>


  
    <div class="bg-light py-3 mb-4 border-bottom">
    <div class="container d-flex justify-content-between align-items-center">
        <h2 class="fw-bold mb-0">My Gallery</h2>
        </div>
        </div>
    {%for image in images%}
    
    <a href = "{% url 'image_detail' image.id %}" target = "blank"><img src = "{{image.image.url}}" width = "300px"></a>
    {% endfor %}

<br>

<h5>Filter Images</h5>

<form>
    {% for tag in tags %}
   <label>
    <div class = "form-check">
    <input type = "checkbox" name = "tags" value = "{{tag.id}}">
    {{tag.tag}}
    </label>
    </div>

    {% endfor %}

    <button type = "submit">Filter</button>
    </form>
    </div>

    <br>
    <br>
    <h5>Recently Viewed</h5>
  

    {% for image in recents %}
    <a href = "{% url 'image_detail' image.id %}" target = "blank"><img src = "{{image.image.url}}"></a>
    {% endfor %}

    

  <br><br>

<a href = "{% url 'upload' %}" class = "btn btn-primary">Add more images</a>
    
</body>
</html>
