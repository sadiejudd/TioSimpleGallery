<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<body>

    <img src = "{{image.image.url}}" width="500px">

    <h3>Comments: </h3>

    <form method = "POST">

    {% for comment in comments %}
    <p>{{comment.comment}}</p>
    {% endfor %}
    
</body>
</html>
